<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login – UniFleet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    header {
      background-color: #e6f0fb;
      text-align: center;
      padding: 1rem;
    }
    header img { height: 40px; }
    .page-title {
      background-color: white;
      text-align: center;
      padding: 1.2rem 1rem 0.8rem;
      font-size: 1.8rem;
      color: #0054a6;
      font-weight: bold;
    }
    .centered-content {
      max-width: 420px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    form label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .flash { padding: 0.7rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash.error { background: #fdecea; color: #b3261e; }
    button {
      margin-top: 1.5rem;
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      background: #0054a6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <img src="{{ url_for('static', filename='UniFleet Logo.png') }}" alt="UniFleet Logo">
  </header>

  <div class="page-title">Admin Login</div>

  <main class="centered-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" required autofocus>
      <button type="submit">Log In</button>
    </form>
  </main>

</body>
</html>
