<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register a Vehicle – UniFleet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    header {
      background-color: #e6f0fb;
      text-align: center;
      padding: 1rem;
    }
    header img { height: 40px; }
    .page-title {
      background-color: white;
      text-align: center;
      padding: 1.2rem 1rem 0.8rem;
      font-size: 1.8rem;
      color: #0054a6;
      font-weight: bold;
    }
    .centered-content {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    form label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .flash { padding: 0.7rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash.error { background: #fdecea; color: #b3261e; }
    .flash.success { background: #e7f4e8; color: #1b5e20; }
    .flash.info { background: #e6f0fb; color: #0054a6; }
    button {
      margin-top: 1.5rem;
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      background: #0054a6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <img src="{{ url_for('static', filename='UniFleet Logo.png') }}" alt="UniFleet Logo">
  </header>

  <div class="page-title">Register a Vehicle</div>

  <main class="centered-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <p>Add a driver &amp; vehicle to your account so it is ready to select when you book a refuel.</p>

    <form method="POST" action="/register-vehicle">
      <label for="account_code">Your 4-Letter Account Code</label>
      <input type="text" name="account_code" id="account_code" maxlength="4"
             value="{{ form_values.account_code if form_values else '' }}" required>

      <label for="driver_name">Driver FULL NAME</label>
      <input type="text" name="driver_name" id="driver_name"
             value="{{ form_values.driver_name if form_values else '' }}" required>

      <label for="number_of_wheels">Number of Wheels on Vehicle</label>
      <input type="number" name="number_of_wheels" id="number_of_wheels"
             value="{{ form_values.number_of_wheels if form_values else '' }}">

      <!-- Fuel type fixed to Diesel for now; selection happens on the Booking page -->
      <input type="hidden" name="fuel_type" value="Diesel">

      <label for="truck_make">Vehicle Make</label>
      <input type="text" name="truck_make" id="truck_make"
             value="{{ form_values.truck_make if form_values else '' }}">

      <label for="truck_model">Vehicle Model</label>
      <input type="text" name="truck_model" id="truck_model"
             value="{{ form_values.truck_model if form_values else '' }}">

      <label for="vehicle_plate">Plate Number of Vehicle</label>
      <input type="text" name="vehicle_plate" id="vehicle_plate"
             value="{{ form_values.vehicle_plate if form_values else '' }}" required>

      <button type="submit">Register Vehicle</button>
    </form>
  </main>

</body>
</html>
